<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Iniciar Sesión</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-100 to-cyan-200 flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl overflow-hidden w-full max-w-4xl grid md:grid-cols-2">

  <!-- IZQUIERDA -->
  <div class="hidden md:flex flex-col justify-center items-center bg-blue-600 text-white p-10">

    <!-- LOGO -->
    <img src="/static/logo.png"
         class="w-80 h-80 object-contain mb-6">

  </div>

  <!-- DERECHA -->
  <div class="p-10">

    <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">
      Iniciar Sesión
    </h2>

    <input id="email"
      placeholder="Correo electrónico"
      class="w-full border p-3 mb-4 rounded-lg focus:ring-2 focus:ring-blue-500">

    <input id="password"
      type="password"
      placeholder="Contraseña"
      class="w-full border p-3 mb-4 rounded-lg focus:ring-2 focus:ring-blue-500">

    <button onclick="login()"
      class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 font-semibold">
      Entrar
    </button>

    <p id="error" class="text-red-500 text-sm mt-4 text-center"></p>

    <div class="mt-6 text-center">

      <p class="text-sm text-gray-600">
        ¿Eres cliente?
      </p>

      <a href="/registro-cliente"
         class="text-blue-600 font-semibold hover:underline">
         Crear cuenta
      </a>

    </div>

  </div>

</div>

<script>
function login(){

  fetch("/login",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  })
  .then(r=>r.json())
  .then(d=>{

    if(d.ok){

      if(d.rol=="admin"){
        window.location="/dashboard";
      }
      else if(d.rol=="vendedor"){
        window.location="/dashboard";
      }
      else if(d.rol=="cajero"){
        window.location="/ventas";
      }
      else if(d.rol=="cliente"){
        window.location="/cliente";
      }

    }else{
      error.innerText="Correo o contraseña incorrectos";
    }

  });

}
</script>

</body>
</html>
