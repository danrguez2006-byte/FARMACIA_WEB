{% extends "layout.html" %}
{% block content %}

<h1 class="text-2xl font-bold mb-4">Caja / Ventas</h1>

<div class="grid md:grid-cols-2 gap-4">

  <div class="bg-white p-4 rounded shadow">
    <input id="buscar" placeholder="Buscar medicamento..." class="w-full border p-2 mb-3 rounded">
    <div id="resultados"></div>
  </div>

  <div class="bg-white p-4 rounded shadow">
    <h2 class="font-bold mb-3">Carrito</h2>

    <div id="carrito"></div>

    <hr class="my-3">

    <p class="text-lg">Total: $<span id="total">0</span></p>

    <input id="pago" placeholder="Pago del cliente" type="number" class="w-full border p-2 mt-3 rounded">

    <p class="mt-2">Cambio: $<span id="cambio">0</span></p>

    <button onclick="finalizar()" class="bg-green-600 text-white w-full p-2 mt-4 rounded hover:bg-green-700">
      Finalizar Venta
    </button>
  </div>

</div>

<script>
let productos = [];
let carritoVenta = [];

function cargarProductos(){
  fetch("/api/productos")
  .then(r => r.json())
  .then(data => {
    productos = data;
  });
}

buscar.oninput = () => {
  let texto = buscar.value.toLowerCase();
  let html = "";

  productos
  .filter(p => p.nombre.toLowerCase().includes(texto))
  .forEach(p => {
    html += `
      <div onclick="agregar(${p.id})" class="p-2 border-b hover:bg-gray-100 cursor-pointer">
        ${p.nombre} - $${Number(p.precio).toFixed(2)} - Stock: ${p.stock}
      </div>
    `;
  });

  resultados.innerHTML = html;
};

function agregar(id){
  let producto = productos.find(p => p.id == id);
  let item = carritoVenta.find(p => p.id == id);

  if(!producto || producto.stock <= 0){
    alert("Producto sin stock");
    return;
  }

  if(item){
    if(item.cantidad < producto.stock){
      item.cantidad++;
    }else{
      alert("No hay más stock disponible");
    }
  }else{
    carritoVenta.push({id:id, cantidad:1});
  }

  renderCarrito();
}

function mas(index){
  let item = carritoVenta[index];
  let producto = productos.find(p => p.id == item.id);

  if(item.cantidad < producto.stock){
    item.cantidad++;
  }else{
    alert("No hay más stock disponible");
  }

  renderCarrito();
}

function menos(index){
  if(carritoVenta[index].cantidad > 1){
    carritoVenta[index].cantidad--;
  }else{
    carritoVenta.splice(index,1);
  }

  renderCarrito();
}

function eliminar(index){
  carritoVenta.splice(index,1);
  renderCarrito();
}

function renderCarrito(){
  let html = "";
  let total = 0;

  carritoVenta.forEach((item,index) => {
    let producto = productos.find(p => p.id == item.id);
    let subtotal = producto.precio * item.cantidad;
    total += subtotal;

    html += `
      <div class="border-b py-2 flex justify-between items-center">
        <div>
          <p class="font-semibold">${producto.nombre}</p>

          <div class="flex gap-2 mt-1">
            <button onclick="menos(${index})" class="bg-red-500 text-white px-2 rounded">-</button>
            <span>${item.cantidad}</span>
            <button onclick="mas(${index})" class="bg-blue-500 text-white px-2 rounded">+</button>
          </div>
        </div>

        <div class="text-right">
          <p>$${subtotal.toFixed(2)}</p>
          <button onclick="eliminar(${index})" class="text-red-600 text-sm">Eliminar</button>
        </div>
      </div>
    `;
  });

  carrito.innerHTML = html;
  total = Number(total.toFixed(2));
  document.getElementById("total").innerText = total;
  calcularCambio();
}

pago.oninput = calcularCambio;

function calcularCambio(){
  let total = parseFloat(document.getElementById("total").innerText) || 0;
  let pagoCliente = parseFloat(pago.value) || 0;
  let cambio = pagoCliente - total;

  document.getElementById("cambio").innerText = cambio.toFixed(2);
}

function finalizar(){
  if(carritoVenta.length == 0){
    alert("Carrito vacío");
    return;
  }

  let total = parseFloat(document.getElementById("total").innerText);
  let pagoCliente = parseFloat(pago.value) || 0;

  if(pagoCliente < total){
    alert("Pago insuficiente");
    return;
  }

  fetch("/api/venta",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({carrito:carritoVenta})
  })
  .then(r => r.json())
  .then(d => {
    if(d.ok){
      alert("Venta realizada correctamente");
      window.open("/ticket/" + d.ticket, "_blank");

      carritoVenta = [];
      pago.value = "";
      buscar.value = "";
      resultados.innerHTML = "";

      cargarProductos();
      renderCarrito();
    }else{
      alert(d.error);
    }
  });
}

cargarProductos();
</script>

{% endblock %}
