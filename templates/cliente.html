{% extends "layout.html" %}
{% block content %}

<h1 class="text-3xl font-extrabold text-slate-800 mb-6">
  Catálogo de Productos
</h1>

<div class="grid md:grid-cols-3 gap-6">

  <!-- CATÁLOGO -->
  <div class="md:col-span-2">

    <input id="buscar"
      placeholder="Buscar medicamento..."
      class="w-full border p-3 mb-6 rounded-xl shadow-sm">

    <div id="catalogo" class="grid md:grid-cols-3 gap-6"></div>

  </div>

  <!-- CARRITO -->
  <div class="bg-white p-6 rounded-2xl shadow h-fit">

    <h2 class="font-bold text-xl mb-4">Mi carrito</h2>

    <div id="carrito"></div>

    <hr class="my-4">

    <p class="text-xl">
      Total:
      <span class="font-extrabold text-green-700">
        $<span id="total">0</span>
      </span>
    </p>

    <input id="telefono"
      placeholder="Teléfono"
      class="w-full border p-3 mt-4 rounded-lg">

    <textarea id="direccion"
      placeholder="Dirección de entrega"
      class="w-full border p-3 mt-3 rounded-lg"></textarea>

    <button onclick="confirmarPedido()"
      class="bg-green-600 text-white w-full p-3 mt-4 rounded-xl hover:bg-green-700 font-semibold">
      Confirmar pedido a domicilio
    </button>

    <a href="/mis-pedidos"
      class="block text-center bg-blue-600 text-white w-full p-3 mt-3 rounded-xl hover:bg-blue-700">
      Ver mis pedidos
    </a>

  </div>

</div>

<script>
let productos = [];
let carritoCliente = [];

function cargarProductos(){

  fetch("/api/productos")
  .then(r => r.json())
  .then(data => {
    productos = data.filter(p => p.stock > 0);
    renderCatalogo(productos);
  });

}

function renderCatalogo(data){

  let html = "";

  data.forEach(p => {

    html += `
    <div class="bg-white rounded-2xl shadow p-4 hover:shadow-xl transition">

      <img src="${p.imagen}"
        class="w-full h-44 object-cover rounded-xl mb-4"
        onerror="this.src='https://images.unsplash.com/photo-1587854692152-cbe660dbde88'">

      <h3 class="font-bold text-lg text-slate-800">
        ${p.nombre}
      </h3>

      <p class="text-blue-700 font-extrabold text-2xl mt-1">
        $${Number(p.precio).toFixed(2)}
      </p>

      <p class="text-sm text-gray-500 mt-1">
        Disponibles: ${p.stock}
      </p>

      <button onclick="agregarCarrito(${p.id})"
        class="bg-blue-600 text-white w-full p-3 mt-4 rounded-xl hover:bg-blue-700 font-semibold">
        Agregar
      </button>

    </div>
    `;

  });

  catalogo.innerHTML = html;
}

buscar.oninput = () => {

  let texto = buscar.value.toLowerCase();

  let filtrado = productos.filter(p =>
    p.nombre.toLowerCase().includes(texto)
  );

  renderCatalogo(filtrado);
};

function agregarCarrito(id){

  let item = carritoCliente.find(x => x.id == id);
  let producto = productos.find(x => x.id == id);

  if(!producto){
    alert("Producto no encontrado");
    return;
  }

  if(item){

    if(item.cantidad < producto.stock){
      item.cantidad++;
    }else{
      alert("No hay más stock disponible");
    }

  }else{

    carritoCliente.push({
      id:id,
      cantidad:1
    });

  }

  renderCarrito();
}

function renderCarrito(){

  let html = "";
  let total = 0;

  carritoCliente.forEach((item,index) => {

    let p = productos.find(x => x.id == item.id);
    let subtotal = p.precio * item.cantidad;

    total += subtotal;

    html += `
    <div class="border-b py-3">

      <div class="flex gap-3">

        <img src="${p.imagen}"
          class="w-14 h-14 object-cover rounded-lg"
          onerror="this.src='https://images.unsplash.com/photo-1587854692152-cbe660dbde88'">

        <div class="flex-1">
          <p class="font-semibold">${p.nombre}</p>

          <div class="flex justify-between items-center mt-2">

            <div class="flex gap-2 items-center">
              <button onclick="menos(${index})"
                class="bg-red-500 text-white px-2 rounded">
                -
              </button>

              <span>${item.cantidad}</span>

              <button onclick="mas(${index})"
                class="bg-blue-500 text-white px-2 rounded">
                +
              </button>
            </div>

            <span class="font-bold">
              $${subtotal.toFixed(2)}
            </span>

          </div>

          <button onclick="eliminar(${index})"
            class="text-red-600 text-sm mt-2">
            Eliminar
          </button>
        </div>

      </div>

    </div>
    `;

  });

  carrito.innerHTML = html;

  total = Number(total.toFixed(2));
  document.getElementById("total").innerText = total;
}

function mas(index){

  let item = carritoCliente[index];
  let producto = productos.find(x => x.id == item.id);

  if(item.cantidad < producto.stock){
    item.cantidad++;
  }else{
    alert("No hay más stock disponible");
  }

  renderCarrito();
}

function menos(index){

  if(carritoCliente[index].cantidad > 1){
    carritoCliente[index].cantidad--;
  }else{
    carritoCliente.splice(index,1);
  }

  renderCarrito();
}

function eliminar(index){
  carritoCliente.splice(index,1);
  renderCarrito();
}

function confirmarPedido(){

  if(carritoCliente.length == 0){
    alert("Tu carrito está vacío");
    return;
  }

  if(telefono.value.trim() == "" || direccion.value.trim() == ""){
    alert("Escribe tu teléfono y dirección");
    return;
  }

  fetch("/api/pedido-online",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      carrito:carritoCliente,
      telefono:telefono.value,
      direccion:direccion.value
    })
  })
  .then(r => r.json())
  .then(d => {

    if(d.ok){

      alert("Pedido realizado. Total: $" + Number(d.total).toFixed(2));

      carritoCliente = [];
      telefono.value = "";
      direccion.value = "";

      cargarProductos();
      renderCarrito();

      window.location = "/mis-pedidos";

    }else{
      alert(d.error);
    }

  });

}

cargarProductos();
</script>

{% endblock %}
