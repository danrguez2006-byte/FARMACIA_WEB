{% extends "layout.html" %}
{% block content %}

<h1 class="text-2xl font-bold mb-4">Mis Pedidos</h1>

<div class="bg-white p-4 rounded shadow">

<table class="w-full text-sm">

  <thead class="bg-gray-200">
    <tr>
      <th class="p-2 text-left">Pedido</th>
      <th class="p-2 text-left">Fecha</th>
      <th class="p-2 text-left">Total</th>
      <th class="p-2 text-left">Estado</th>
      <th class="p-2 text-left">Teléfono</th>
      <th class="p-2 text-left">Dirección</th>
    </tr>
  </thead>

  <tbody id="tabla"></tbody>

</table>

</div>

<script>
fetch("/api/mis-pedidos")
.then(r => r.json())
.then(data => {
  let html = "";

  data.forEach(p => {
    html += `
      <tr class="border-b">
        <td class="p-2">#${p.id}</td>
        <td class="p-2">${p.fecha}</td>
        <td class="p-2">$${Number(p.total).toFixed(2)}</td>
        <td class="p-2">
          <span class="bg-yellow-100 text-yellow-700 px-2 py-1 rounded">
            ${p.estado}
          </span>
        </td>
        <td class="p-2">${p.telefono}</td>
        <td class="p-2">${p.direccion}</td>
      </tr>
    `;
  });

  tabla.innerHTML = html;
});
</script>

{% endblock %}
